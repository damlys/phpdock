apiVersion: v1
kind: Pod
metadata:
  namespace: default
  name: app
spec:
  containers:
    - name: container0
      image: ghcr.io/damlys/phpdock
      env:
        - name: PHP_OPCACHE_ENABLE
          value: "false"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      resources:
        requests:
          cpu: 250m
          limit: 256M
        limits:
          cpu: 1000m
          memory: 1G
      ports:
        - containerPort: 8080
          protocol: TCP
