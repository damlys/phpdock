apiVersion: skaffold/v2beta26
kind: Config
build:
  local:
    useDockerCLI: true
    push: false
  artifacts:
    - image: ghcr.io/damlys/phpdock
      context: .
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: app/**/*
            strip: app
            dest: /app
  tagPolicy:
    gitCommit:
      variant: AbbrevCommitSha
deploy:
  kubeContext: docker-desktop
  kubectl:
    manifests:
      - ./pod.yaml
portForward:
  - namespace: default
    resourceType: pod
    resourceName: app
    port: 8080
    localPort: 38080
