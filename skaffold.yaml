apiVersion: skaffold/v2beta28
kind: Config
build:
  local:
    useDockerCLI: true
    push: false
  artifacts:
    - image: ghcr.io/damlys/phpdock
      context: .
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: app/**/*
            strip: app
            dest: /app
  tagPolicy:
    inputDigest: {}
deploy:
  kubeContext: docker-desktop
  kustomize:
    paths:
      - k8s/overlays/dev
